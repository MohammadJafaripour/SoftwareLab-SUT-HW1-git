name: Deploy Static Site to GitHub Pages

on:
  push:
    branches:
      - main  # Code ingestion triggers automation only on protected branch changes

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Source Tree
        uses: actions/checkout@v4

      - name: Setup Cloud Pages Node
        uses: actions/configure-pages@v4

      # New Step: Prepares page.html to be served as the root homepage
      - name: Prepare page.html as entry point
        run: |
          if [ -f "page.html" ]; then
            cp page.html index.html
          else
            echo "Error: page.html not found!" && exit 1
          fi

      - name: Upload Static Web Assets
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'  # Deploys the root directory containing the newly generated index.html

      - name: Deploy Live Instance to Production
        id: deployment
        uses: actions/deploy-pages@v4
